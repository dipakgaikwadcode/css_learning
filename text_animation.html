<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .textcontainer {
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: sans-serif;
            letter-spacing: 4px;
            font-size: 70px;
            font-weight: 700;
             perspective: 60px;
        }
        .textcontainer > b {
            height: 80px;
            box-shadow: 0px 20px 10px gray;
           background-color: darkorange;
           color: transparent;
           background-clip: text;
           transform-origin: bottom;
           animation: getupDown 10s infinite;
        }
        .textcontainer > b:nth-child(1) {
            animation-delay: 0.25s;
        }
        .textcontainer > b:nth-child(2) {
            animation-delay: 0.50s;
        }
         .textcontainer > b:nth-child(3) {
            animation-delay: 0.75s;
         }
          .textcontainer > b:nth-child(4) {
            animation-delay: 0.25s; 
          }
         .textcontainer > b:nth-child(5) {
            animation-delay: 1s;
         }

         @keyframes getupDown {
            from{transform: rotateX(-85deg)}
            10%,50%{transform: rotateX(0);}
            60%,to{transform: rotateX(-85deg);}
         }
    </style>
</head>
<body>
    <div class="textcontainer">
        <b>D</b><b>I</b><b>P</b><b>A</b><b>K</b>
    </div>
</body>
</html>
