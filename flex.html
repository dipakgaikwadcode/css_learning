<!DOCTYPE html>
<html lang="en">
<head>
    <style>
        .flex-items {
            width: 170px;
            height: 100px;
            background-color: blueviolet;
            border: 3px solid red;
            border-radius: 30px;
            margin-top: 20px;
            padding: 40px;
            color: white;
            font-size: 30px;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .flex-container {
            display: flex;
            flex-direction: row;
            flex-wrap: wrap;
            justify-content: space-between;
        }
    </style>
    <title>Document</title>
</head>
<body>
     <!-- ul.flex-container>li.flex-items*10 -->
    <ul class="flex-container">
        <li class="flex-items">1</li>
        <li class="flex-items">2</li>
        <li class="flex-items">3</li>
        <li class="flex-items">4</li>
        <li class="flex-items">5</li>
        <li class="flex-items">6</li>
        <li class="flex-items">7</li>
        <li class="flex-items">8</li>
        <li class="flex-items">9</li>
        <li class="flex-items">10</li>
    </ul>
</body>
</html>
