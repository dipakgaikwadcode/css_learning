<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>hover</title>
    <style>
        h1:hover{
          color: white;
          background-color: black;
          font-family: fantasy;
          font-size: large;
          border: 4px double red;
          padding: 20px;
        }

        h2:active {
            color: greenyellow;
            font-size: 40px;
            cursor: pointer;
        }
    input:focus {
        background-color: coral;
        color: black;
        border: 10px solid yellow;
    }
    a:visited {
        color: blueviolet;
    }
    p::first-line {
        color: blueviolet;
    }
    #name::first-letter {
        color: chartreuse;
    }
    </style>
</head>
<body>
   <h1>dipak gaikwad</h1> 
   <h2>hello css</h2>

   <input type="text"/>

   <p>Lorem ipsum dolor sit amet consectetur adipisicing elit. Veniam temporibus quia placeat atque illo ad non quos repellendus odio, praesentium odit illum magnam consequatur, repellat ullam animi, enim inventore aut.</p>
   <h1 id="name">Dipak</h1>

   <a href="https://www.instagram.com/?hl=en" target="_blank">click me!</a>
</body>
</html>
