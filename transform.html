<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 30px;
            padding-top: 50px;
        }
        .box {
            background-color: rgb(173, 127, 215);
            border-radius: 10px;
            height: 250px;
            width: 250px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 20px;
            transition: transform 5s ease-in;
        }
        .box1:hover {
            transform: translate(125px,125px);
        }
        .box2:hover {
            transform: translateX(125px);
        }
        .box3:hover {
            transform: translateY(150px);
        }
        .box4:hover {
          transform: rotate(-150deg);
          background-color: chartreuse;
        }
        .box5:hover {
            transform: skew(50deg);
        }
        .box6:hover {
            transform: scale(1.3);
        }
        .box7:hover {
            transform: rotate(40deg) scale(1.8) translateY(200px);
            background-color: blueviolet;
        }
    </style>
</head>
<body>
   <div class="container">
    <div class="box box1">translate</div>
    <div class="box box2 ">translateX</div>
    <div class="box box3" >translateY</div>
    <div class="box box4">rotate</div>
    <div class="box box5">skew</div>
    <div class="box box6">scale</div>
    <div class="box box6"> mix</div>

   </div> 
</body>
</html>
