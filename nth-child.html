<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>nth child concept</title>
<style>
ul {
    width: 200px;
     text-decoration: none;
    

} 
li {
    padding: 10px;
    border: 2px solid green;
    border-radius: 3px;
    margin-bottom: 5px;
    background-color: bisque;
    text-decoration: none;
    
}   
li:nth-child(odd) {
    background-color: blueviolet;
}
</style>
</head>
<body>
    <ul>
        <li>item1</li>
        <li>item2</li>
        <li>item3</li>
        <li>item4</li>
        <li>item5</li>
        <li>item6</li>
        <li>item7</li>
        <li>item8</li>
    </ul>
</body>
</html>
